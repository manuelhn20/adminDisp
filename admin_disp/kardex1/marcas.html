<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marcas — Inventario</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
  <script src="/static/js/security-sanitize.js"></script>
</head>
<body class="bg-gray-100 text-gray-800">

  <!-- ───────────────────────── CONTENIDO PRINCIPAL ───────────────────────── -->
  <div class="p-6">
    <!-- Encabezado -->
    <div class="flex items-center justify-between mb-6">
      <h1 class="text-2xl font-bold text-gray-800">Gestión de Marcas</h1>
      <button onclick="abrirModalCrear()"
        class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg flex items-center gap-2 transition">
        <i class="fa fa-plus"></i> Nueva Marca
      </button>
    </div>

    <!-- Tabla -->
    <div class="bg-white rounded-xl shadow overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-gray-50 border-b border-gray-200">
          <tr>
            <th class="text-left px-4 py-3 font-semibold text-gray-600">ID</th>
            <th class="text-left px-4 py-3 font-semibold text-gray-600">Nombre</th>
            <th class="text-left px-4 py-3 font-semibold text-gray-600">Estado</th>
            <th class="text-left px-4 py-3 font-semibold text-gray-600">Creado</th>
            <th class="text-right px-4 py-3 font-semibold text-gray-600">Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaMarcas" class="divide-y divide-gray-100">
          <tr>
            <td colspan="5" class="text-center py-8 text-gray-400">
              <i class="fa fa-spinner fa-spin mr-2"></i>Cargando...
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ───────────────────── MODAL CREAR / EDITAR ──────────────────────────── -->
  <div id="modalMarca" class="fixed inset-0 z-50 flex items-center justify-center hidden">
    <!-- Overlay -->
    <div class="absolute inset-0 bg-black/50" onclick="cerrarModal()"></div>

    <!-- Contenido -->
    <div class="relative bg-white rounded-xl shadow-2xl w-full max-w-md mx-4 z-10">
      <!-- Header -->
      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
        <h2 id="modalMarcaTitulo" class="text-lg font-semibold text-gray-800">Nueva Marca</h2>
        <button onclick="cerrarModal()" class="text-gray-400 hover:text-gray-600 transition">
          <i class="fa fa-times text-xl"></i>
        </button>
      </div>

      <!-- Cuerpo -->
      <div class="px-6 py-5 space-y-4">
        <input type="hidden" id="marcaId" />

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">
            Nombre <span class="text-red-500">*</span>
          </label>
          <input id="marcaNombre" type="text" placeholder="Nombre de la marca"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                   focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
        </div>

        <!-- Alerta de error -->
        <div id="marcaError" class="hidden bg-red-50 border border-red-200 text-red-700 text-sm rounded-lg px-4 py-3"></div>
      </div>

      <!-- Footer -->
      <div class="flex justify-end gap-3 px-6 py-4 border-t border-gray-100">
        <button onclick="cerrarModal()"
          class="px-4 py-2 text-sm font-medium text-gray-600 bg-white border border-gray-300
                 rounded-lg hover:bg-gray-50 transition">
          Cancelar
        </button>
        <button onclick="guardarMarca()"
          class="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-lg
                 hover:bg-blue-700 transition flex items-center gap-2">
          <i class="fa fa-save"></i>
          <span id="btnGuardarTexto">Guardar</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ───────────────────────── MODAL CONFIRMAR TOGGLE ────────────────────── -->
  <div id="modalConfirmar" class="fixed inset-0 z-50 flex items-center justify-center hidden">
    <div class="absolute inset-0 bg-black/50" onclick="cerrarModalConfirmar()"></div>
    <div class="relative bg-white rounded-xl shadow-2xl w-full max-w-sm mx-4 z-10">
      <div class="px-6 py-5 text-center">
        <div id="confirmarIcono" class="text-5xl mb-3"></div>
        <h3 id="confirmarTitulo" class="text-lg font-semibold text-gray-800 mb-2"></h3>
        <p id="confirmarMensaje" class="text-sm text-gray-500"></p>
      </div>
      <div class="flex gap-3 px-6 pb-5">
        <button onclick="cerrarModalConfirmar()"
          class="flex-1 px-4 py-2 text-sm font-medium text-gray-600 bg-white border border-gray-300
                 rounded-lg hover:bg-gray-50 transition">
          Cancelar
        </button>
        <button id="btnConfirmar" onclick="confirmarToggle()"
          class="flex-1 px-4 py-2 text-sm font-medium text-white rounded-lg transition">
          Confirmar
        </button>
      </div>
    </div>
  </div>

  <!-- ───────────────────────────── TOAST ─────────────────────────────────── -->
  <div id="toast" class="fixed bottom-4 right-4 z-50 hidden">
    <div id="toastContent" class="flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg text-sm font-medium text-white min-w-[260px]">
      <i id="toastIcon" class="fa"></i>
      <span id="toastMsg"></span>
    </div>
  </div>

  <script src="/js/inventario/marcas.js"></script>
</body>
</html>
