<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Liquidaciones — PROIMA</title>
  <script>window.DISABLE_GLOBAL_SANITIZE_PATCH = true;</script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.6/dist/purify.min.js"></script>
  <script src="{{ url_for('static', filename='js/security-sanitize.js') }}"></script>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@32.3.3/styles/ag-grid.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ag-grid-community@32.3.3/styles/ag-theme-material.css">
  <script src="https://cdn.jsdelivr.net/npm/ag-grid-community@32.3.3/dist/ag-grid-community.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">

  <link rel="icon" href="{{ url_for('static', filename='img/favicon.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/cxc.css') }}">

  <style>
    /* ── Layout ───────────────────────────────────────────────── */
    .lotes-wrap {
      display: flex; flex-direction: column; height: calc(100vh - 112px);
      padding: 0 16px; gap: 0;
    }
    .lotes-grid-wrap {
      flex: 1; min-height: 0;
    }
    #lotesGrid {
      width: 100%; height: 100%;
    }

    /* ── Cobros Modal ─────────────────────────────────────────── */
    .cobros-modal-tbl { width:100%;border-collapse:collapse;font-size:12px; }
    .cobros-modal-tbl th {
      background:rgba(255,255,255,.04);color:var(--muted);padding:7px 10px;
      font-size:10px;text-transform:uppercase;letter-spacing:.06em;
      text-align:left;position:sticky;top:0;z-index:1;
    }
    .cobros-modal-tbl td { padding:7px 10px;border-bottom:1px solid rgba(255,255,255,.05);color:var(--text); }
    .cobros-modal-tbl tr:hover td { background:rgba(34,197,94,.04); }
    :root[data-theme="light"] .cobros-modal-tbl th { background:rgba(0,0,0,.04); }
    :root[data-theme="light"] .cobros-modal-tbl td { border-bottom-color:rgba(0,0,0,.07); }

    /* ── Toolbar strip ────────────────────────────────────────── */
    .lotes-toolbar {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; flex-wrap: wrap;
    }
    .lotes-toolbar h2 {
      font-size: 16px; font-weight: 700; color: var(--text);
      margin: 0; display: flex; align-items: center; gap: 8px;
    }
    .lotes-toolbar h2 .material-symbols-rounded { color: var(--brand); font-size: 20px; }
    .spacer { flex: 1 1 auto; }

    /* ── Cell badges for lotes grid ──────────────────────────── */
    .lb-procesado {
      display: inline-flex; align-items: center; gap: 4px;
      border-radius: 20px; padding: 3px 10px; font-size: 11px; font-weight: 700;
      background: linear-gradient(135deg, rgba(234,179,8,.22), rgba(234,179,8,.07));
      border: 1px solid rgba(234,179,8,.5); color: #fde047;
    }
    .lb-finalizado {
      display: inline-flex; align-items: center; gap: 5px;
      border-radius: 20px; padding: 3px 12px; font-size: 11px; font-weight: 700;
      background: linear-gradient(135deg, rgba(34,197,94,.26), rgba(34,197,94,.10));
      border: 1px solid rgba(34,197,94,.55); color: #4ade80;
      box-shadow: 0 0 8px rgba(34,197,94,.15);
    }
    .lb-icon { font-size: 13px !important; }

    /* ── Action buttons in grid ──────────────────────────────── */
    .la-btn {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 7px; border: none; cursor: pointer;
      font-size: 11px; font-weight: 600; font-family: inherit;
      transition: filter .12s, background .14s;
    }
    .la-btn:hover { filter: brightness(1.12); }
    .la-btn--pdf { background: rgba(59,130,246,.20); color: #93c5fd; border: 1px solid rgba(59,130,246,.40); }
    .la-btn--fin { background: rgba(34,197,94,.18); color: #86efac; border: 1px solid rgba(34,197,94,.40); }
    .la-btn--cob { background: rgba(100,116,139,.15); color: #cbd5e1; border: 1px solid rgba(100,116,139,.30); }
    .la-btn--cob:hover { filter: none; background: rgba(34,197,94,.16); color: #86efac; border-color: rgba(34,197,94,.4); }

    /* ── PDF viewer ───────────────────────────────────────────── */
    #cxcPDFModal {
      display: none; position: fixed; inset: 0; z-index: 10200;
      background: rgba(0,0,0,0.82); align-items: center; justify-content: center;
    }
    #cxcPDFModal.active { display: flex; }
    #cxcPDFModal .modal-content {
      display: flex; flex-direction: column;
      width: 92vw; height: 92vh; background: #1a1a1a;
      border-radius: 12px; overflow: hidden;
      box-shadow: 0 24px 60px rgba(0,0,0,0.7);
    }
    .cxc-pdf-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px; background: #16a34a; flex-shrink: 0; gap: 12px; flex-wrap: wrap;
    }
    .cxc-pdf-header h3 { margin:0; color:#fff; font-size:14px; font-weight:600; }
    .cxc-pdf-controls {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .cxc-pdf-controls button {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 11px; border-radius: 6px; border: none; cursor: pointer;
      font-size: 12px; font-weight: 600; background: rgba(255,255,255,0.15);
      color: #fff; transition: background .15s;
    }
    .cxc-pdf-controls button:hover { background: rgba(255,255,255,0.28); }
    .cxc-pdf-zoom-group {
      display: flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,0.12); border-radius: 20px; padding: 4px 10px;
    }
    .cxc-pdf-zoom-group button { background: transparent; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    .cxc-zoom-slider { width: 90px; accent-color: #22c55e; cursor: pointer; }
    .cxc-zoom-label  { color:#fff; font-size:11px; font-weight:600; min-width:36px; text-align:center; }
    .cxc-pdf-body {
      flex:1; overflow:auto; display:flex; justify-content:center;
      align-items:flex-start; background:#525252; padding:12px;
    }
    #cxcPDFCanvas { display:block; box-shadow:0 4px 20px rgba(0,0,0,0.5); }
    @keyframes pdfSpin { to { transform: rotate(360deg); } }

    /* ── Count chip ───────────────────────────────────────────── */
    .count-chip {
      background: rgba(34,197,94,.12); border: 1px solid rgba(34,197,94,.3);
      color: #86efac; border-radius: 20px; padding: 2px 10px; font-size: 11px; font-weight: 700;
    }
  </style>
</head>

<script>
// ── PDF.js viewer ────────────────────────────────────────────────────────────
const PDFJS_CDN = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs';
let _pdfDoc = null, _pdfZoom = 100, _pdfCurrentUrl = null, _pdfFileName = 'liquidacion.pdf';

async function cxcOpenPDFViewer(fileId, fileName, directUrl, blobUrl) {
  const modal  = document.getElementById('cxcPDFModal');
  const body   = document.getElementById('cxcPDFBody');
  const title  = document.getElementById('cxcPDFTitle');
  const canvas = document.getElementById('cxcPDFCanvas');
  modal.classList.add('active');
  title.textContent = fileName || 'Liquidación PDF';
  _pdfFileName = fileName || 'liquidacion.pdf';

  // Mostrar spinner de carga
  canvas.style.display = 'none';
  let loader = document.getElementById('cxcPDFLoader');
  if (!loader) {
    loader = document.createElement('div');
    loader.id = 'cxcPDFLoader';
    loader.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;gap:14px;color:#a3a3a3;">
        <div style="width:40px;height:40px;border:4px solid rgba(255,255,255,.15);
                    border-top-color:#22c55e;border-radius:50%;
                    animation:pdfSpin .8s linear infinite;"></div>
        <span style="font-size:14px;">Cargando PDF...</span>
      </div>`;
    loader.style.cssText = 'display:flex;align-items:center;justify-content:center;height:100%;width:100%;';
    body.appendChild(loader);
  }
  loader.style.display = 'flex';
  body.style.alignItems = 'center';

  let pdfUrl = blobUrl || directUrl;
  if (!pdfUrl && fileId) {
    pdfUrl = `/cxc/liquidacion/download/${encodeURIComponent(fileId)}?name=${encodeURIComponent(fileName || '')}`;
  }
  _pdfCurrentUrl = pdfUrl;
  _pdfZoom = 100;
  document.getElementById('cxcZoomSlider').value = 100;
  document.getElementById('cxcZoomLabel').textContent = '100%';

  const _hideLoader = () => {
    loader.style.display = 'none';
    canvas.style.display = 'block';
    body.style.alignItems = 'flex-start';
  };

  try {
    const pdfjsLib = await import(PDFJS_CDN);
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.worker.min.mjs';
    _pdfDoc = await pdfjsLib.getDocument(pdfUrl).promise;
    _hideLoader();
    await _renderPDFPage(1, pdfjsLib);
  } catch (e) {
    _hideLoader();
    canvas.getContext('2d').clearRect(0,0,9999,9999);
    alert('Error al cargar el PDF: ' + e);
  }
}

async function _renderPDFPage(pageNum, lib) {
  const canvas = document.getElementById('cxcPDFCanvas');
  const body   = document.getElementById('cxcPDFBody');
  const page   = await _pdfDoc.getPage(pageNum);
  const vp     = page.getViewport({ scale: _pdfZoom / 100 });
  canvas.width  = vp.width;
  canvas.height = vp.height;
  await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
}

function cxcClosePDFModal() {
  document.getElementById('cxcPDFModal').classList.remove('active');
  if (_pdfCurrentUrl && _pdfCurrentUrl.startsWith('blob:')) URL.revokeObjectURL(_pdfCurrentUrl);
  _pdfDoc = null; _pdfCurrentUrl = null;
}

function cxcSetZoom(v) {
  _pdfZoom = v;
  document.getElementById('cxcZoomSlider').value = v;
  document.getElementById('cxcZoomLabel').textContent = v + '%';
  if (_pdfDoc) _renderPDFPage(1, null).catch(()=>{});
}
function cxcOnZoomInput(v) { document.getElementById('cxcZoomLabel').textContent = v + '%'; }
function cxcZoomIn()  { cxcSetZoom(Math.min(250, _pdfZoom + 15)); }
function cxcZoomOut() { cxcSetZoom(Math.max(50,  _pdfZoom - 15)); }
function cxcFitWidth(){ cxcSetZoom(100); }
function cxcDownloadPDF() {
  if (!_pdfCurrentUrl) return;
  const a = document.createElement('a');
  a.href = _pdfCurrentUrl; a.download = _pdfFileName; a.click();
}
function cxcPrintPDF() {
  if (!_pdfCurrentUrl) return;
  const iframe = document.createElement('iframe');
  iframe.style.display = 'none'; iframe.src = _pdfCurrentUrl;
  document.body.appendChild(iframe);
  iframe.onload = () => { setTimeout(() => { iframe.contentWindow.print(); }, 200); };
}

// ── Confirm modal helper ─────────────────────────────────────────────────────
function showConfirm(msg, onOk, onCancel, title = 'Confirmación', icon = 'help') {
  const m = document.getElementById('confirmModal');
  document.getElementById('confirmModalMsg').textContent   = msg;
  document.getElementById('confirmModalTitle').textContent = title;
  document.getElementById('confirmModalIcon').textContent  = icon;
  m.classList.add('open');
  function cleanup() { m.classList.remove('open'); okBtn.onclick = cancelBtn.onclick = closeBtn.onclick = null; }
  const okBtn     = document.getElementById('confirmModalOk');
  const cancelBtn = document.getElementById('confirmModalCancel');
  const closeBtn  = document.getElementById('confirmModalClose');
  okBtn.onclick     = () => { cleanup(); onOk && onOk(); };
  cancelBtn.onclick = () => { cleanup(); onCancel && onCancel(); };
  closeBtn.onclick  = () => { cleanup(); onCancel && onCancel(); };
}

// ── Date formatter ───────────────────────────────────────────────────────────
function fmtDate(raw) {
  if (!raw) return '—';
  return String(raw).replace('T', ' ').replace(/\.\d+$/, '').substring(0, 19);
}

// ── Money formatter ──────────────────────────────────────────────────────────
function fmtMoney(v) {
  if (v == null) return '—';
  return 'L ' + parseFloat(v).toLocaleString('es-HN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

// ── Lotes Grid ───────────────────────────────────────────────────────────────
let gridApi;

const colDefs = [
  {
    field: 'numeroLiquidacion', headerName: 'No. Liquidación', width: 150, pinned: 'left',
    cellRenderer: p => {
      const v = p.value || ('#' + p.data?.id);
      return `<span style="font-weight:800;color:var(--brand,#22c55e)">${v}</span>`;
    },
  },
  {
    field: 'estado', headerName: 'Estado', width: 130,
    cellRenderer: p => {
      const v = p.value || 'Procesado';
      if (v === 'Finalizado')
        return `<span class="lb-finalizado">${v}</span>`;
      return `<span class="lb-procesado">${v}</span>`;
    },
  },
  { field: 'ejecutivo',       headerName: 'ejecutivo',    width: 160, cellStyle: { color: 'var(--text)' } },
  {
    field: 'fechaGeneracion', headerName: 'Fecha Inicio', width: 190,
    cellRenderer: p => fmtDate(p.value),
  },
  {
    field: 'fechaFin',        headerName: 'Fecha Fin',    width: 190,
    cellRenderer: p => p.value ? fmtDate(p.value) : '<span style="color:var(--muted)">—</span>',
  },
  {
    field: 'total', headerName: 'Total', width: 130,
    cellStyle: { fontWeight: '700' },
    cellRenderer: p => fmtMoney(p.value),
  },
  {
    field: 'num_cobros', headerName: 'Cobros', width: 90, type: 'numericColumn',
    cellStyle: { color: 'var(--muted)', textAlign: 'center' },
  },
  {
    headerName: 'Acciones', width: 270, sortable: false, resizable: false,
    cellRenderer: p => {
      const l = p.data;
      const btnPdf = l.spFileId
        ? `<button class="la-btn la-btn--pdf" onclick="openLotePdf('${encodeURIComponent(l.spFileId)}','${(l.spFileName||'').replace(/'/g,"\\'")}','${(l.spDownloadUrl||'').replace(/'/g,"\\'")}')" title="Ver PDF">
             <span class="material-symbols-rounded" style="font-size:13px">picture_as_pdf</span> PDF
           </button>`
        : `<span style="color:var(--muted);font-size:11px">Sin PDF</span>`;

      const btnFin = l.estado !== 'Finalizado'
        ? `<button class="la-btn la-btn--fin" onclick="finalizarLote(${l.id}, '${(l.numeroLiquidacion||'').replace(/'/g,"\\'")}')" title="Finalizar">
             <span class="material-symbols-rounded" style="font-size:13px">task_alt</span> Finalizar
           </button>`
        : '';

      const btnCob = `<button class="la-btn la-btn--cob" onclick="openCobrosModal(${l.id}, '${(l.numeroLiquidacion||'#'+l.id).replace(/'/g,"\\'")}')" id="btnCob${l.id}">
           <span class="material-symbols-rounded" style="font-size:13px">list</span> ${l.num_cobros} cobro(s)
         </button>`;

      return `<div style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">${btnPdf}${btnFin}${btnCob}</div>`;
    },
  },
];

document.addEventListener('DOMContentLoaded', () => {
  // Leer estado de URL param
  const urlEstado = new URLSearchParams(window.location.search).get('estado') || '';
  if (urlEstado) {
    const titleEl = document.getElementById('lotesPageTitle');
    const iconEl  = document.getElementById('lotesPageIcon');
    if (titleEl) titleEl.textContent = urlEstado === 'Finalizado' ? 'Liquidaciones Finalizadas' : ('Liquidaciones — ' + urlEstado);
    if (iconEl && urlEstado === 'Finalizado') iconEl.textContent = 'task_alt';
    document.title = (urlEstado === 'Finalizado' ? 'Finalizadas' : urlEstado) + ' — PROIMA';
  }
  const el = document.getElementById('lotesGrid');
  gridApi = agGrid.createGrid(el, {
    columnDefs: colDefs,
    rowData: [],
    rowHeight: 44,
    headerHeight: 38,
    defaultColDef: { sortable: true, resizable: true, filter: false },
    rowSelection: 'single',
    suppressRowClickSelection: true,
    animateRows: true,
    localeText: {
      loadingOoo:   'Cargando...',
      noRowsToShow: 'Sin liquidaciones registradas.',
    },
  });

  loadLotes();

  // User menu toggle
  document.getElementById('userMenuToggle')?.addEventListener('click', () => {
    document.getElementById('userMenuDropdown')?.classList.toggle('open');
    document.getElementById('userMenuArrow')?.classList.toggle('rotated');
  });
  document.addEventListener('click', e => {
    if (!e.target.closest('#userMenu')) {
      document.getElementById('userMenuDropdown')?.classList.remove('open');
      document.getElementById('userMenuArrow')?.classList.remove('rotated');
    }
  });
});

async function loadLotes() {
  const btn = document.getElementById('btnRefresh');
  if (btn) btn.disabled = true;
  try {
    const urlEstado = new URLSearchParams(window.location.search).get('estado') || '';
    const query = urlEstado ? `?estado=${encodeURIComponent(urlEstado)}&limit=500` : '?limit=500';
    const resp = await fetch('/cxc/lotes' + query, { credentials: 'same-origin' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const lotes = await resp.json();
    gridApi.setGridOption('rowData', lotes);
    gridApi.hideOverlay();
  } catch (err) {
    console.error('Error cargando lotes:', err);
    gridApi.setGridOption('rowData', []);
    gridApi.showNoRowsOverlay();
  } finally {
    if (btn) btn.disabled = false;
  }
}

// ── Abrir PDF ────────────────────────────────────────────────────────────────
function openLotePdf(fileId, fileName, directUrl) {
  cxcOpenPDFViewer(decodeURIComponent(fileId), fileName, directUrl, null);
}

// ── Cobros Modal ─────────────────────────────────────────────────────────────
async function openCobrosModal(loteId, titulo) {
  const modal   = document.getElementById('cobrosModal');
  const body    = document.getElementById('cobrosModalBody');
  const titleEl = document.getElementById('cobrosModalTitle');
  if (!modal) return;
  if (titleEl) titleEl.textContent = 'Cobros — ' + (titulo || ('#' + loteId));
  body.innerHTML = '<div style="text-align:center;padding:32px;color:var(--muted);">Cargando...</div>';
  modal.classList.add('open');

  document.getElementById('cobrosModalClose')?.addEventListener('click', () => {
    modal.classList.remove('open');
  }, { once: true });
  modal.addEventListener('click', e => {
    if (e.target === modal) modal.classList.remove('open');
  }, { once: true });

  try {
    const resp = await fetch(`/cxc/lotes/${loteId}/cobros`, { credentials: 'same-origin' });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const cobros = await resp.json();
    if (!cobros.length) {
      body.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted);">Sin cobros asociados a este lote.</div>';
      return;
    }
    const total = cobros.reduce((acc, c) => acc + (parseFloat(c.valorPagado) || 0), 0);
    const rows  = cobros.map((c, i) => `<tr>
      <td style="color:var(--muted);text-align:center">${i + 1}</td>
      <td>${c.noRecibo || '&mdash;'}</td>
      <td style="font-weight:600">${c.nombreCliente || '&mdash;'}</td>
      <td>${c.noFactura || '&mdash;'}</td>
      <td style="font-weight:700;color:var(--brand,#22c55e)">${fmtMoney(c.valorPagado)}</td>
      <td>${c.metodoPago || '&mdash;'}</td>
      <td>${c.banco || '&mdash;'}</td>
      <td>${c.ejecutivo || '&mdash;'}</td>
      <td style="color:var(--muted)">${fmtDate(c.creado)}</td>
    </tr>`).join('');
    body.innerHTML = `
      <div style="padding:0 0 10px;display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:11px;color:var(--muted);">${cobros.length} registro(s)</span>
        <span style="font-size:13px;font-weight:700;color:var(--brand,#22c55e);">Total: ${fmtMoney(total)}</span>
      </div>
      <table class="cobros-modal-tbl">
        <thead><tr>
          <th>#</th><th>No. Recibo</th><th>Cliente</th><th>Factura</th>
          <th>Valor Pagado</th><th>M&eacute;todo Pago</th><th>banco</th><th>ejecutivo</th><th>Fecha</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  } catch (err) {
    body.innerHTML = `<p style="color:#ef4444;padding:16px;">Error: ${err}</p>`;
  }
}

// ── Finalizar lote ───────────────────────────────────────────────────────────
function finalizarLote(loteId, numero) {
  showConfirm(
    `¿Confirmar la finalización del lote ${numero || '#' + loteId}?\n\nEsto cambiará el estado a "Finalizado", registrará la fecha de cierre y marcará los cobros como liquidado.`,
    async () => {
      try {
        const resp = await fetch(`/cxc/lotes/${loteId}/finalizar`, {
          method: 'POST', credentials: 'same-origin',
        });
        const data = await resp.json();
        if (data.status === 'ok') {
          loadLotes();
        } else {
          alert(data.message || 'Error al finalizar.');
        }
      } catch (err) {
        alert('Error: ' + err);
      }
    },
    null, 'Finalizar Liquidación', 'task_alt'
  );
}
