{% for emp in empleados_options %}
<tr data-emp-id="{{ emp.IdEmpleado }}">
  <td>
    <div style="display:flex; align-items:center; justify-content:space-between;">
      <div style="flex:1;">{{ emp.NombreCompleto }}</div>
      <div style="flex:0 0 auto; margin-left:8px; text-align:right;">
        <span class="device-count-badge {% if (emp.DispositivosCount|default(0)) > 0 %}has-count{% endif %}">{{ emp.DispositivosCount|default(0) }}</span>
      </div>
    </div>
  </td>
  <td>{{ emp.Empresa or '' }}</td>
  <td>{{ emp.Cargo or '-' }}</td>
  <td class="table-actions">
    <button class="btn btn-primary btn-small" onclick="openEmpleadoDevicesModalFromResumen({{ emp.IdEmpleado }})" style="display:inline-flex;align-items:center;gap:8px;">
      <span>Ver</span>
      <img src="{{ url_for('static', filename='img/devicesb.png') }}" alt="Dispositivos" style="width:30px; height:30px; vertical-align:middle;">
    </button>
  </td>
</tr>
{% endfor %}
